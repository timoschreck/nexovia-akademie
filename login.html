<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXOVIA Akademie Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <div class="card" style="max-width:400px;margin:100px auto;text-align:center;">
      <img src="assets/nexovia-logo.jpg" alt="Nexovia Logo" style="max-width:200px;margin-bottom:20px;">
      <h2>Willkommen zur NEXOVIA Akademie</h2>
      <p>Bitte melden Sie sich mit Ihrer E‑Mail und Passwort an.</p>
      <form>
        <div style="margin-bottom:15px;text-align:left;">
          <label for="email">E‑Mail</label><br>
          <input type="email" id="email" name="email" style="width:100%;padding:10px;border-radius:var(--radius);border: none;">
        </div>
        <div style="margin-bottom:20px;text-align:left;">
          <label for="password">Passwort</label><br>
          <input type="password" id="password" name="password" style="width:100%;padding:10px;border-radius:var(--radius);border: none;">
        </div>
        <button class="primary" type="submit" onclick="event.preventDefault();window.location.href='index.html'">Login</button>
      </form>
    </div>
  </main>
  <footer>NEXOVIA Akademie © 2026</footer>
</body>
</html>
