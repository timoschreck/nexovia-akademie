    <script>
    // Simple toggle function to show or hide PDF sections. When the heading is clicked,
    // this function toggles the display property between 'none' and 'block'.
    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
    }
